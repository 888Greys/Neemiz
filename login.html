    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col justify-center items-center p-space-md">
<div class="w-full max-w-sm flex flex-col">
<div class="text-center mb-space-xl">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tighter font-black uppercase">NEEMIZ</h1>
</div>
<div class="flex w-full mb-space-lg border-b border-outline-variant">
<button class="flex-1 pb-3 text-center font-body-md text-body-md text-primary border-b-2 border-primary transition-colors">
                Login
            </button>
<button class="flex-1 pb-3 text-center font-body-md text-body-md text-on-surface-variant hover:text-on-surface transition-colors">
                Sign Up
            </button>
</div>
<form class="flex flex-col gap-space-md">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-space-xs uppercase tracking-widest" for="identifier">Email or Phone</label>
<div class="relative">
<input class="w-full bg-surface-dim border border-outline-variant rounded-lg px-space-md py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors placeholder-on-tertiary-fixed-variant" id="identifier" placeholder="Enter your credentials" type="text"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-space-xs uppercase tracking-widest" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-dim border border-outline-variant rounded-lg px-space-md py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors placeholder-on-tertiary-fixed-variant" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-space-sm">
<a class="font-body-sm text-body-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
</div>
<button class="w-full mt-space-sm bg-primary-container text-on-background font-body-md text-body-md font-semibold py-3 rounded-lg hover:bg-primary transition-colors shadow-sm" type="button">
                Sign In
            </button>
</form>
<div class="flex items-center my-space-lg">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-space-md font-body-sm text-body-sm text-on-surface-variant uppercase tracking-widest">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="flex flex-col gap-space-sm">
<button class="w-full bg-transparent border border-outline-variant rounded-lg py-3 font-body-md text-body-md text-on-surface hover:bg-surface-variant transition-colors flex items-center justify-center gap-space-sm" type="button">
<span class="material-symbols-outlined text-[20px]">language</span>
                Continue with Google
            </button>
<button class="w-full bg-transparent border border-outline-variant rounded-lg py-3 font-body-md text-body-md text-on-surface hover:bg-surface-variant transition-colors flex items-center justify-center gap-space-sm" type="button">
<span class="material-symbols-outlined text-[20px]">phone_iphone</span>
                Continue with Apple
            </button>
</div>
<div class="mt-space-xl text-center font-body-sm text-body-sm text-on-surface-variant px-space-md">
            By continuing, you agree to our <a class="text-on-surface hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">Terms of Service</a> and <a class="text-on-surface hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">Privacy Policy</a>.
        </div>
</div>
