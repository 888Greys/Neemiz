name: release-please

# Automates versioning + CHANGELOG from Conventional Commits.
# On every push to main it maintains a "Release vX.Y.Z" PR; merging that PR
# bumps package.json, updates CHANGELOG.md, tags the release, and publishes a
# GitHub Release. feat: -> minor, fix:/perf: -> patch, feat!/BREAKING -> major.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
