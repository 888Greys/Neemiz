name: Deploy to nez

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# never run two deploys at once
concurrency:
  group: deploy-nez
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/888greys/neemiz

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Write build-time public env
        # NEXT_PUBLIC_* are inlined into the client bundle at build time.
        # .dockerignore keeps .env.production (and only that) in the build context.
        run: |
          cat > .env.production <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_AVIATOR_WS_URL=${{ secrets.NEXT_PUBLIC_AVIATOR_WS_URL }}
          NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=${{ secrets.NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE }}
          NEXT_PUBLIC_PESAPAL_ENABLED=${{ secrets.NEXT_PUBLIC_PESAPAL_ENABLED }}
          EOF

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Auth token for Sentry source-map upload during `next build` (BuildKit
          # secret — kept out of the image layers and history).
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.NEZ_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.NEZ_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Pull image on nez and swap container
        run: |
          printf '%s\n' "${{ secrets.GITHUB_TOKEN }}" | \
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=30 \
              -o ConnectTimeout=20 -o TCPKeepAlive=yes \
              -i ~/.ssh/id_ed25519 \
              "${{ secrets.NEZ_USER }}@${{ secrets.NEZ_HOST }}" \
              "deploy ${{ env.IMAGE_NAME }}:${{ github.sha }}"
