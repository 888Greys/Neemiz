name: Restore admin SSH key to nez

# One-off recovery: the local admin key was overwritten. This reuses the
# existing (still-authorized) deploy key to append a new admin public key to
# nez's authorized_keys. Manual trigger only — never runs on push.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  restore-key:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH (existing deploy key)
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.NEZ_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.NEZ_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Append new admin public key
        run: |
          ssh -o ConnectTimeout=20 -i ~/.ssh/id_ed25519 \
              "${{ secrets.NEZ_USER }}@${{ secrets.NEZ_HOST }}" \
              "mkdir -p ~/.ssh && chmod 700 ~/.ssh && touch ~/.ssh/authorized_keys && grep -qF 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIG+xyEQAzUi65RjgxL4eO1OvBUpEIYo0rwF6s85+vTd4 toxicgreys001@gmail.com' ~/.ssh/authorized_keys || echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIG+xyEQAzUi65RjgxL4eO1OvBUpEIYo0rwF6s85+vTd4 toxicgreys001@gmail.com' >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys && echo '== authorized_keys now ==' && grep -cF 'toxicgreys001@gmail.com' ~/.ssh/authorized_keys && wc -l ~/.ssh/authorized_keys"
