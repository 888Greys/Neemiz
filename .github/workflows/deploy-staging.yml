name: Deploy Staging (nez-test)

# Manual, on-demand deploy of ANY branch/SHA to the staging environment at
# https://nez-test.nezeem.com (separate Supabase DB, real Lipa creds reused
# from prod). Does NOT touch production. Use this to test a feature branch
# end-to-end before it is merged to main.

on:
  # Auto-deploy: every push to the `staging` branch goes live on nez-test.
  push:
    branches: [staging]
  # Manual: deploy ANY branch/SHA on demand without merging into `staging`.
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit SHA to deploy to staging"
        required: true
        default: staging

permissions:
  contents: read
  packages: write

# never run two staging deploys at once (independent of the prod deploy group)
concurrency:
  group: deploy-staging-nez
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/888greys/neemiz

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # manual run → the chosen ref; push to `staging` → the pushed commit
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Write build-time public env (STAGING)
        # NEXT_PUBLIC_* are inlined into the client bundle at build time, so
        # staging needs its OWN build pointing at the staging Supabase project.
        run: |
          cat > .env.production <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL_STAGING }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_STAGING }}
          NEXT_PUBLIC_APP_URL=https://nez-test.nezeem.com
          NEXT_PUBLIC_AVIATOR_WS_URL=${{ secrets.NEXT_PUBLIC_AVIATOR_WS_URL }}
          NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE=${{ secrets.NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE }}
          EOF

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}-staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.NEZ_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.NEZ_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy to staging on nez
        # The forced-command key runs /opt/neemiz/deploy.sh, which dispatches
        # "deploy-staging <image>" to /opt/neemiz-staging/deploy-staging.sh.
        run: |
          printf '%s\n' "${{ secrets.GITHUB_TOKEN }}" | \
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=30 \
              -o ConnectTimeout=20 -o TCPKeepAlive=yes \
              -i ~/.ssh/id_ed25519 \
              "${{ secrets.NEZ_USER }}@${{ secrets.NEZ_HOST }}" \
              "deploy-staging ${{ env.IMAGE_NAME }}:${{ github.sha }}-staging"
